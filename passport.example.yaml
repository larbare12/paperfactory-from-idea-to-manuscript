research_question: >
  What lexical and syntactic patterns distinguish LLM-generated hallucinated
  citations from authentic ones in peer-reviewed NLP literature?

methodology:
  description: >
    Collect 500 LLM-generated citations across 5 models (GPT-4, Claude 3,
    Llama 3, Gemini 1.5, Qwen 2.5), verify each against Semantic Scholar API,
    classify hallucination types (TF/PAC/IH/PH/SH), train a logistic regression
    on n-gram and dependency-parse features to predict hallucination class.
  design_type: experimental
  data_source: >
    LLM API outputs (prompted with real paper abstracts) + Semantic Scholar
    Academic Graph API for ground-truth verification

