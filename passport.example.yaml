argument_audit:
  - claim_id: "CLM-001"
    claim_text: >
      LLMs with larger parameter counts produce more sophisticated hallucinations
      (PAC and PH types) rather than total fabrications (TF).
    da_attacks:
      - "Parameter count confounds with training data cutoff date; newer models
        may simply encounter fewer verifiable papers, inflating TF rates."
      - "The TF classification itself is noisy — S2 API gaps can produce false
        positives that look like total fabrications."
      - "Corpus bias: the prompt set was drawn from pre-2023 NLP papers; results
        may not generalize to other domains."
    rebuttal_score: 4
    frame_lock_detected: false

